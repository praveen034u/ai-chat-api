name: CI/CD to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger.

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    env:
      IMAGE: ${{ secrets.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/${{ secrets.SERVICE_NAME }}:latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t $IMAGE .

      - name: Push Docker images to Artifact Registry
        run: |
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ secrets.SERVICE_NAME }} \
            --image $IMAGE \
            --region ${{ secrets.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --port 8080 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 900s \
            --concurrency 80 \
            --set-env-vars "POSTGRES_URL=${{ secrets.POSTGRES_URL }},GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            --set-secrets "POSTGRES_URL=POSTGRES_URL:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest" \
            --labels "app=ai-chat-api,env=production,managed-by=github-actions"

      - name: Output Cloud Run URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ secrets.SERVICE_NAME }} \
            --region ${{ secrets.REGION }} \
            --format 'value(status.url)')
          echo "Service deployed to: $SERVICE_URL"
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_OUTPUT
